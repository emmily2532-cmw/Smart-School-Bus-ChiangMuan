<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Bus | เชียงม่วนวิทยาคม</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
   <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="./script.js"></script>
    
    <style>
        /* (CSS เดิมของคุณครูใช้งานได้ดีมากครับ คงไว้ตามเดิมได้เลย) */
        :root { --primary: #2C3E50; --secondary: #3498DB; --accent: #E74C3C; --bg-color: #F4F7F6; --card-bg: #FFFFFF; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: var(--primary); }
        
        .gate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; text-align: center; }
        .gate-content { background: #ffffff; padding: 40px 30px; border-radius: 20px; max-width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .gate-btn { background: var(--secondary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        .header { text-align: center; margin-bottom: 20px; background: var(--primary); color: white; padding: 15px; border-radius: 12px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex: 1; min-width: 320px; }
        
        .camera-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background-color: #000; aspect-ratio: 4/3; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .status-badge { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; background-color: #e8f8f5; color: #1abc9c; border: 1px solid #1abc9c; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .weather-box { background: #F8F9F9; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #EAEDED; }
        .value { font-size: 22px; font-weight: 600; color: var(--secondary); display: block; }
        .alert-box { margin-top: 15px; padding: 12px; background: #FDEDEC; color: var(--accent); border-radius: 8px; border-left: 4px solid var(--accent); display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #95A5A6; }
    </style>
</head>
<body>

    <div id="camera-gate" class="gate-overlay">
        <div class="gate-content">
            <h2>🚌 Smart School Bus</h2>
            <p>กรุณากด "อนุญาต" เพื่อเริ่มต้นระบบ</p>
            <button onclick="startVideo()" class="gate-btn">ลองเปิดกล้องอีกครั้ง</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <h1>🚌 Smart School Bus System</h1>
            <p>โรงเรียนเชียงม่วนวิทยาคม</p>
        </div>

        <div class="container">
            <div class="card">
                <h3>📷 สแกนใบหน้า</h3>
                <div class="camera-container">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="overlay"></canvas> 
                </div>
                <div id="scan-status" class="status-badge">⏳ กำลังโหลดโมเดล...</div>
            </div>

            <div class="card">
                <h3>🌤️ สภาพแวดล้อม</h3>
                <div class="weather-grid">
                    <div class="weather-box"><span class="value" id="temp">-</span>อุณหภูมิ (°C)</div>
                    <div class="weather-box"><span class="value" id="humid">-</span>ความชื้น (%)</div>
                    <div class="weather-box" style="grid-column: span 2;"><span class="value" id="pm25">-</span>ฝุ่น PM2.5</div>
                </div>
                <div class="alert-box" id="pm-warning">⚠️ แจ้งเตือน: ค่าฝุ่นเกินมาตรฐาน!</div>
            </div>
        </div>
        <div class="footer">Powered by AI Edge Computing</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyceO8xYIfmc2vbz4rKiI4_CT3TUreAUGuXGoXUuR4C1WIg5QNSPzXAtQR9HDHOJG0t/exec";
        function fetchSensorData() {
            fetch(GOOGLE_SCRIPT_URL + "?type=GET_DASHBOARD")
                .then(response => response.json())
                .then(data => {
                    document.getElementById('temp').innerText = data.temp;
                    document.getElementById('humid').innerText = data.humid;
                    document.getElementById('pm25').innerText = data.pm25;
                    document.getElementById('pm-warning').style.display = (data.pm25 > 35) ? "block" : "none";
                })
                .catch(() => console.log('รอข้อมูลเซนเซอร์...'));
        }
        setInterval(fetchSensorData, 15000);
        fetchSensorData();
    </script>
</body>
</html>
